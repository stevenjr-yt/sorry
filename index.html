<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayna 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a0b1c; /* Warna background gelap biar bunganya pop out */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* Container Bunganya */
        .flower {
            position: relative;
            width: 100px;
            height: 300px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        /* Batang Bunga */
        .stem {
            position: absolute;
            bottom: 0;
            width: 8px;
            height: 180px;
            background: linear-gradient(to right, #1b5e20, #4caf50, #1b5e20);
            border-radius: 4px;
        }

        /* Daun */
        .leaf {
            position: absolute;
            bottom: 60px;
            width: 40px;
            height: 20px;
            background: #4caf50;
            border-radius: 0 20px 0 20px;
            transition: transform 2s ease-in-out;
        }
        
        .leaf-left {
            left: -20px;
            transform-origin: right bottom;
            transform: rotate(-30deg) scale(0.5);
        }
        
        .leaf-right {
            right: -20px;
            border-radius: 20px 0 20px 0;
            transform-origin: left bottom;
            transform: rotate(30deg) scale(0.5);
            bottom: 80px;
        }

        /* Kelopak Bunga (Petals) */
        .petals {
            position: absolute;
            bottom: 170px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .petal {
            position: absolute;
            bottom: 0;
            width: 50px;
            height: 90px;
            background: linear-gradient(to bottom, #ff1493, #c2185b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            transition: transform 2.5s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 2.5s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
            /* Kondisi Kuncup Awal */
            transform: scale(0.6) rotate(0deg); 
            z-index: 2;
        }

        /* Urutan kelopak biar numpuknya pas */
        .p1 { z-index: 5; background: linear-gradient(to bottom, #ff4081, #d81b60); }
        .p2 { z-index: 4; }
        .p3 { z-index: 3; }
        .p4 { z-index: 2; }
        .p5 { z-index: 1; }

        /* --- ANIMASI PAS MEKAR (Class .blooming ditambahkan via JS) --- */
        .flower.blooming .p1 { transform: scale(1.1) rotate(0deg); box-shadow: 0 0 20px rgba(255, 20, 147, 0.5); }
        .flower.blooming .p2 { transform: scale(1) rotate(-35deg); }
        .flower.blooming .p3 { transform: scale(1) rotate(35deg); }
        .flower.blooming .p4 { transform: scale(0.9) rotate(-70deg); }
        .flower.blooming .p5 { transform: scale(0.9) rotate(70deg); }
        
        .flower.blooming .leaf-left { transform: rotate(-50deg) scale(1); }
        .flower.blooming .leaf-right { transform: rotate(50deg) scale(1); }

        /* Teks yang muncul */
        .message-container {
            position: absolute;
            top: -100px;
            text-align: center;
            width: 300px;
            pointer-events: none;
        }

        #message {
            font-family: 'Dancing Script', cursive;
            color: #ffb6c1;
            font-size: 38px;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease-in-out;
        }

        #sub-message {
            font-family: 'Poppins', sans-serif;
            color: white;
            font-size: 14px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease-in-out;
            transition-delay: 1s; /* Munculnya telat dikit dari teks utama */
        }

        .hint {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
            transition: opacity 0.5s;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container" onclick="makeItBloom()">
        
        <div class="message-container">
            <div id="message">Kamu cantikkkk...</div>
            <div id="sub-message">Maafin aku ya, Ayna? ❤️</div>
        </div>

        <div class="flower" id="magicFlower">
            <div class="stem"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            <div class="petals">
                <div class="petal p5"></div>
                <div class="petal p4"></div>
                <div class="petal p3"></div>
                <div class="petal p2"></div>
                <div class="petal p1"></div>
            </div>
        </div>

        <div class="hint" id="hintText">Tap bunganya (Pencet di mana aja)</div>

    </div>

    <script>
        let hasBloomed = false;

        function makeItBloom() {
            if (hasBloomed) return;
            hasBloomed = true;

            // Ilangin teks hint
            document.getElementById("hintText").style.opacity = '0';

            // Tambahin class blooming biar CSS ngejalanin animasi mekarnya
            document.getElementById("magicFlower").classList.add("blooming");

            // Munculin teks setelah bunganya mulai mekar (delay 1.5 detik)
            setTimeout(() => {
                document.getElementById("message").style.opacity = '1';
                document.getElementById("message").style.transform = 'translateY(0)';
                
                document.getElementById("sub-message").style.opacity = '1';
                document.getElementById("sub-message").style.transform = 'translateY(0)';
            }, 1500);
        }
    </script>

</body>
</html>
