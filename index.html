<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Ayna 🌹</title>
    <style>
        /* Pake font yang elegan dari Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fdfbfb; /* Putih bersih agak warm */
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Biar animasi mawar gak bikin scroll */
        }

        .card-container {
            position: relative;
            width: 320px;
            height: 480px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            z-index: 10;
        }

        .card-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .flower-img {
            width: 100%;
            height: 480px; /* Full sebelum diklik */
            object-fit: cover;
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .content {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            background: white;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Kelas yang ditambahkan via JS saat diklik */
        .show-content .flower-img {
            height: 250px;
            border-bottom: 2px solid #f0f0f0;
            filter: brightness(0.9);
        }

        .show-content .content {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #b71c1c; /* Merah mawar gelap */
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        .hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            pointer-events: none;
            transition: opacity 0.4s ease;
            width: 100%;
            text-align: center;
            letter-spacing: 1px;
        }

        .show-content .hint {
            opacity: 0;
        }

        /* Animasi Kelopak Jatuh */
        .petal {
            position: absolute;
            background-color: #d32f2f;
            border-radius: 15px 0 15px 0; /* Bentuk mirip kelopak */
            opacity: 0.6;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="openCard()">
        <img src="https://images.unsplash.com/photo-1562690868-60bbe7293e94?q=80&w=600&auto=format&fit=crop" alt="Buket Mawar" class="flower-img">
        <div class="hint" id="hintText">Tap Bunganya ✨</div>
        
        <div class="content">
            <h1>Maafin aku ya, Ayna?</h1>
            <p>Aku beneran nyesel udah bikin kamu bete. Ini buket mawar virtual buat kamu. Jangan ngambek lagi ya, senyum dong cantik... 🤍🌹</p>
        </div>
    </div>

    <script>
        let isOpened = false;

        function openCard() {
            if (isOpened) return; // Biar efeknya cuma jalan sekali
            isOpened = true;
            
            // Munculin teks dan kecilin gambar mawar
            document.querySelector('.card-container').classList.add('show-content');
            
            // Memicu animasi kelopak jatuh
            dropPetals();
        }

        function dropPetals() {
            // Bikin 30 kelopak mawar
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    let petal = document.createElement('div');
                    petal.classList.add('petal');
                    
                    // Acak ukuran kelopak
                    let size = Math.random() * 12 + 10; 
                    petal.style.width = size + 'px';
                    petal.style.height = size + 'px';
                    
                    // Acak posisi horizontal
                    petal.style.left = Math.random() * 100 + 'vw';
                    
                    // Acak durasi jatuhnya biar natural (antara 4 sampai 8 detik)
                    petal.style.animationDuration = (Math.random() * 4 + 4) + 's'; 
                    
                    // Tambahin kelopak ke body
                    document.body.appendChild(petal);
                    
                    // Bersihin DOM setelah animasi kelar biar gak berat
                    setTimeout(() => {
                        petal.remove();
                    }, 8000);
                    
                }, i * 150); // Kelopak jatuhnya berurutan, gak barengan
            }
        }
    </script>

</body>
</html>
